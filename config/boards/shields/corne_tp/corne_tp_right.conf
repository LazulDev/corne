# No OLED on right half

# I2C for trackpad
CONFIG_I2C=y

# BLE TX power (match central)
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y
# Improve BLE reconnection stability (must match central — disables 2M PHY)
CONFIG_ZMK_BLE_EXPERIMENTAL_CONN=y

# Sleep (peripheral must also enter deep sleep and re-advertise on wake)
CONFIG_ZMK_SLEEP=y
CONFIG_ZMK_IDLE_TIMEOUT=600000
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=900000

# Pointing / Trackpad
CONFIG_ZMK_POINTING=y
CONFIG_ZMK_MOUSE=y
CONFIG_INPUT=y
CONFIG_INPUT_AZOTEQ_IQS5XX=y
