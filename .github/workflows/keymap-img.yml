name: 🎨 Draw ZMK keymaps

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "config/*.keymap"
      - "config/*.dtsi"
      - "keymap_drawer.config.yaml"
      - ".github/workflows/keymap-img.yml"

jobs:
  draw:
    uses: caksoylar/keymap-drawer/.github/workflows/draw-zmk.yml@main
    permissions:
      contents: write
    with:
      keymap_patterns: "config/*.keymap"
      config_path: "keymap_drawer.config.yaml"
      output_folder: "assets/imgs"
      draw_args: "corne_tp:'-k splitkb/aurora/corne/rev1'"
      fail_on_error: true
      debug_mode: true
